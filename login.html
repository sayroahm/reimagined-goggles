<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Felix Enterprise — Sign In</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@300;400;500;600;700&family=Exo+2:wght@200;300;400;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-base:      #080c10;
      --bg-panel:     #0d1117;
      --bg-card:      #111820;
      --border:       #1e2d3d;
      --border-glow:  #1a4a6e;
      --accent:       #0f7fd4;
      --accent-soft:  rgba(15,127,212,0.10);
      --accent-glow:  rgba(15,127,212,0.3);
      --text-primary: #ccd6e0;
      --text-dim:     #5a7a94;
      --text-muted:   #2e4558;
      --danger:       #e05252;
      --danger-soft:  rgba(224,82,82,0.12);
      --success:      #2ecc71;
      --success-soft: rgba(46,204,113,0.12);
      --warning:      #e0a832;
      --warning-soft: rgba(224,168,50,0.12);
      --mono:         'Share Tech Mono', monospace;
      --sans:         'Rajdhani', sans-serif;
      --body:         'Exo 2', sans-serif;
    }

    html, body { height: 100%; }

    body {
      background: var(--bg-base);
      color: var(--text-primary);
      font-family: var(--body);
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 24px;
    }

    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0;
      background-image:
        linear-gradient(rgba(15,127,212,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(15,127,212,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    body::after {
      content: '';
      position: fixed; inset: 0; z-index: 0;
      background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(15,127,212,0.06) 0%, transparent 70%);
      pointer-events: none;
    }

    .topbar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      height: 48px;
      background: rgba(8,12,16,0.95);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 32px;
      backdrop-filter: blur(8px);
    }

    .topbar-logo {
      font-family: var(--mono);
      font-size: 13px;
      color: var(--accent);
      letter-spacing: 0.1em;
    }

    .topbar-back {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text-dim);
      text-decoration: none;
      letter-spacing: 0.15em;
      transition: color 0.2s;
    }

    .topbar-back:hover { color: var(--accent); }

    /* ── PANEL ── */
    .panel {
      position: relative; z-index: 1;
      background: var(--bg-card);
      border: 1px solid var(--border);
      width: 100%; max-width: 420px;
      padding: 40px 40px 36px;
      margin-top: 48px;
      animation: slideIn 0.5s ease both;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .panel::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--accent), transparent);
    }

    .panel-label {
      font-family: var(--mono);
      font-size: 9px;
      color: var(--accent);
      letter-spacing: 0.3em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .panel-title {
      font-family: var(--sans);
      font-size: 28px;
      font-weight: 700;
      color: #e8f4ff;
      margin-bottom: 4px;
    }

    .panel-subtitle {
      font-size: 13px;
      color: var(--text-dim);
      font-weight: 300;
      margin-bottom: 32px;
    }

    /* ── FORM ── */
    .field {
      margin-bottom: 18px;
    }

    .field-label {
      display: block;
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text-dim);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .field-input {
      width: 100%;
      background: var(--bg-panel);
      border: 1px solid var(--border);
      color: var(--text-primary);
      font-family: var(--mono);
      font-size: 13px;
      padding: 11px 14px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      letter-spacing: 0.04em;
    }

    .field-input::placeholder { color: var(--text-muted); }

    .field-input:focus {
      border-color: var(--border-glow);
      box-shadow: 0 0 0 3px var(--accent-soft);
    }

    /* ── FORGOT LINK ── */
    .forgot-row {
      display: flex; justify-content: flex-end;
      margin-top: -10px;
      margin-bottom: 18px;
    }

    .forgot-link {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text-dim);
      text-decoration: none;
      letter-spacing: 0.1em;
      transition: color 0.2s;
    }

    .forgot-link:hover { color: var(--accent); }

    /* ── ALERT ── */
    .alert {
      display: none;
      padding: 12px 14px;
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.05em;
      line-height: 1.6;
      margin-bottom: 20px;
      border-left: 3px solid;
    }

    .alert.error {
      background: var(--danger-soft);
      border-color: var(--danger);
      color: #f08080;
      display: block;
    }

    .alert.warning {
      background: var(--warning-soft);
      border-color: var(--warning);
      color: #e8c060;
      display: block;
    }

    .alert.success {
      background: var(--success-soft);
      border-color: var(--success);
      color: #70e0a0;
      display: block;
    }

    /* ── RESEND BUTTON (shown in warning alert) ── */
    .resend-btn {
      background: none;
      border: 1px solid var(--warning);
      color: #e8c060;
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.1em;
      padding: 5px 12px;
      cursor: pointer;
      margin-top: 10px;
      display: none;
      transition: background 0.2s;
    }

    .resend-btn:hover { background: var(--warning-soft); }
    .resend-btn.visible { display: inline-block; }

    /* ── SUBMIT BUTTON ── */
    .btn-submit {
      width: 100%;
      background: var(--accent);
      border: none;
      color: #fff;
      font-family: var(--sans);
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 14px;
      cursor: pointer;
      transition: background 0.2s, box-shadow 0.2s, opacity 0.2s;
      margin-top: 8px;
    }

    .btn-submit:hover:not(:disabled) {
      background: #1a90e8;
      box-shadow: 0 0 20px var(--accent-glow);
    }

    .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-submit .spinner {
      display: inline-block;
      width: 12px; height: 12px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 28px 0 24px;
    }

    .panel-footer {
      text-align: center;
      font-size: 12px;
      color: var(--text-dim);
    }

    .panel-footer a {
      color: var(--accent);
      text-decoration: none;
      font-family: var(--mono);
      font-size: 11px;
    }

    .panel-footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <div class="topbar">
    <div class="topbar-logo">FELIX//SYS</div>
    <a href="index.html" class="topbar-back">← BACK TO PORTAL</a>
  </div>

  <div class="panel">
    <div class="panel-label">// AUTHENTICATION</div>
    <div class="panel-title">Sign In</div>
    <div class="panel-subtitle">Enter your credentials to access Felix.</div>

    <div class="alert" id="alert"></div>
    <button class="resend-btn" id="resendBtn" onclick="resendVerification()">RESEND VERIFICATION EMAIL</button>

    <div class="field">
      <label class="field-label" for="email">Email Address</label>
      <input class="field-input" type="email" id="email" placeholder="agent@organization.gov" autocomplete="email"/>
    </div>

    <div class="field">
      <label class="field-label" for="password">Password</label>
      <input class="field-input" type="password" id="password" placeholder="••••••••" autocomplete="current-password"/>
    </div>

    <div class="forgot-row">
      <a href="forgot.html" class="forgot-link">FORGOT PASSWORD?</a>
    </div>

    <button class="btn-submit" id="loginBtn" onclick="handleLogin()">
      AUTHENTICATE
    </button>

    <hr class="divider"/>

    <div class="panel-footer">
      No account? &nbsp;<a href="register.html">Request Access →</a>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
    import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-analytics.js";
    import {
      getAuth,
      signInWithEmailAndPassword,
      sendEmailVerification
    } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCtEi3_E3ZOwjTdw4tSexlPvEB27lZp0UU",
      authDomain: "felix-582ed.firebaseapp.com",
      projectId: "felix-582ed",
      storageBucket: "felix-582ed.firebasestorage.app",
      messagingSenderId: "434043393116",
      appId: "1:434043393116:web:5f20713d301320c38b0299",
      measurementId: "G-JXR6MRSYME"
    };

    const app = initializeApp(firebaseConfig);
    const analytics = getAnalytics(app);
    const auth = getAuth(app);

    /* ── Stored user ref for resend ── */
    let _unverifiedUser = null;

    /* ── Alert helpers ── */
    function showAlert(msg, type = "error") {
      const el = document.getElementById("alert");
      el.textContent = msg;
      el.className = `alert ${type}`;
    }

    function clearAlert() {
      document.getElementById("alert").className = "alert";
      document.getElementById("resendBtn").classList.remove("visible");
    }

    /* ── Login ── */
    window.handleLogin = async function () {
      clearAlert();
      const email    = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      const btn      = document.getElementById("loginBtn");

      if (!email)    return showAlert("⚠ Email address is required.");
      if (!password) return showAlert("⚠ Password is required.");

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> AUTHENTICATING...';

      try {
        const cred = await signInWithEmailAndPassword(auth, email, password);
        const user = cred.user;

        if (!user.emailVerified) {
          _unverifiedUser = user;
          showAlert(
            "⚠ Your email address has not been verified. Please check your inbox and verify before signing in.",
            "warning"
          );
          document.getElementById("resendBtn").classList.add("visible");
          btn.disabled = false;
          btn.innerHTML = "AUTHENTICATE";
          return;
        }

        /* Verified — redirect to dashboard */
        window.location.href = "dashboard.html";

      } catch (err) {
        const messages = {
          "auth/invalid-credential":      "⚠ Incorrect email or password.",
          "auth/user-not-found":          "⚠ No account found with this email.",
          "auth/wrong-password":          "⚠ Incorrect password.",
          "auth/invalid-email":           "⚠ Invalid email format.",
          "auth/too-many-requests":       "⚠ Too many attempts. Account temporarily locked.",
          "auth/network-request-failed":  "⚠ Network error. Check your connection.",
          "auth/user-disabled":           "⚠ This account has been disabled.",
        };
        showAlert(messages[err.code] || `⚠ Error: ${err.message}`);
        btn.disabled = false;
        btn.innerHTML = "AUTHENTICATE";
      }
    };

    /* ── Resend Verification ── */
    window.resendVerification = async function () {
      const btn = document.getElementById("resendBtn");
      if (!_unverifiedUser) return;

      try {
        await sendEmailVerification(_unverifiedUser);
        showAlert("✓ Verification email resent. Check your inbox.", "success");
        btn.classList.remove("visible");
      } catch (err) {
        showAlert("⚠ Failed to resend verification email. Try again shortly.", "warning");
      }
    };

    /* ── Enter key support ── */
    document.addEventListener("keydown", (e) => {
      if (e.key === "Enter") window.handleLogin();
    });
  </script>
</body>
</html>
