<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Felix Enterprise — Sign In</title>
  <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@300;400;500;600;700&family=Source+Serif+4:wght@400;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #f4f6f8;
      --surface:     #ffffff;
      --border:      #d0d7de;
      --border-focus:#005EB8;
      --blue:        #005EB8;
      --blue-hover:  #004a93;
      --blue-light:  #e8f0fb;
      --blue-mid:    #ccddf5;
      --text:        #1a1d23;
      --text-sub:    #4a5568;
      --text-dim:    #718096;
      --text-muted:  #a0aec0;
      --success:     #276749;
      --success-bg:  #e6f4ee;
      --danger:      #c53030;
      --danger-bg:   #fff5f5;
      --warning:     #744210;
      --warning-bg:  #fffbeb;
      --warning-border: #f6c762;
      --font:        'Source Sans 3', sans-serif;
      --serif:       'Source Serif 4', serif;
      --radius:      3px;
    }

    body {
      background: var(--bg);
      font-family: var(--font);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── HEADER ── */
    .header {
      background: var(--blue);
      padding: 0 32px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .header-brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .header-logo {
      width: 32px; height: 32px;
      background: rgba(255,255,255,0.2);
      border-radius: 4px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; color: #fff; font-weight: 700;
      font-family: var(--serif);
    }

    .header-name {
      color: #fff;
      font-size: 17px;
      font-weight: 600;
    }

    .header-sub {
      color: rgba(255,255,255,0.65);
      font-size: 12px;
    }

    .header-back {
      color: rgba(255,255,255,0.75);
      font-size: 13px;
      text-decoration: none;
      display: flex; align-items: center; gap: 4px;
      transition: color 0.15s;
    }

    .header-back:hover { color: #fff; }

    /* ── MAIN ── */
    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
    }

    /* ── FORM CARD ── */
    .form-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      width: 100%;
      max-width: 420px;
      overflow: hidden;
    }

    .form-card-header {
      background: var(--blue-light);
      border-bottom: 1px solid var(--blue-mid);
      padding: 20px 28px 18px;
    }

    .form-eyebrow {
      font-size: 11px;
      font-weight: 600;
      color: var(--blue);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 4px;
    }

    .form-title {
      font-family: var(--serif);
      font-size: 22px;
      font-weight: 600;
      color: var(--text);
    }

    .form-body {
      padding: 24px 28px 28px;
    }

    /* ── ALERT ── */
    .alert {
      display: none;
      border-radius: var(--radius);
      padding: 10px 14px;
      font-size: 13px;
      line-height: 1.5;
      margin-bottom: 18px;
      border-left: 3px solid;
    }

    .alert.error {
      background: var(--danger-bg);
      border-color: var(--danger);
      color: var(--danger);
      display: block;
    }

    .alert.warning {
      background: var(--warning-bg);
      border-color: var(--warning-border);
      color: var(--warning);
      display: block;
    }

    .alert.success {
      background: var(--success-bg);
      border-color: #52b788;
      color: var(--success);
      display: block;
    }

    /* ── FIELDS ── */
    .field { margin-bottom: 16px; }

    .field-label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-sub);
      margin-bottom: 5px;
    }

    .field-input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
      padding: 9px 12px;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .field-input::placeholder { color: var(--text-muted); }

    .field-input:focus {
      border-color: var(--border-focus);
      box-shadow: 0 0 0 3px var(--blue-mid);
    }

    /* ── FORGOT ── */
    .field-row-split {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 5px;
    }

    .forgot-link {
      font-size: 12px;
      color: var(--blue);
      text-decoration: none;
    }

    .forgot-link:hover { text-decoration: underline; }

    /* ── BUTTONS ── */
    .btn {
      width: 100%;
      padding: 10px 16px;
      border: none;
      border-radius: var(--radius);
      font-family: var(--font);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, box-shadow 0.15s, opacity 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      text-decoration: none;
    }

    .btn:disabled { opacity: 0.55; cursor: not-allowed; }

    .btn-primary {
      background: var(--blue);
      color: #fff;
      margin-bottom: 10px;
    }

    .btn-primary:hover:not(:disabled) {
      background: var(--blue-hover);
      box-shadow: 0 1px 4px rgba(0,94,184,0.3);
    }

    .btn-google {
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
      margin-bottom: 0;
    }

    .btn-google:hover:not(:disabled) {
      background: var(--bg);
      border-color: var(--border-dark, #b0bac5);
    }

    .google-icon {
      width: 18px; height: 18px;
      flex-shrink: 0;
    }

    /* ── DIVIDER ── */
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 16px 0;
      color: var(--text-muted);
      font-size: 12px;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      border-top: 1px solid var(--border);
    }

    /* ── RESEND ── */
    .resend-row {
      display: none;
      margin-top: 10px;
    }

    .resend-row.visible { display: block; }

    .btn-resend {
      width: 100%;
      padding: 8px;
      background: transparent;
      border: 1px solid var(--warning-border);
      border-radius: var(--radius);
      color: var(--warning);
      font-family: var(--font);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }

    .btn-resend:hover { background: var(--warning-bg); }

    /* ── SPINNER ── */
    .spinner {
      width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }

    .spinner-dark {
      border-color: rgba(0,0,0,0.15);
      border-top-color: var(--text-sub);
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── FOOTER LINK ── */
    .form-footer {
      margin-top: 20px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
      text-align: center;
      font-size: 13px;
      color: var(--text-dim);
    }

    .form-footer a {
      color: var(--blue);
      text-decoration: none;
      font-weight: 600;
    }

    .form-footer a:hover { text-decoration: underline; }

    /* ── PAGE FOOTER ── */
    footer {
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 14px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    footer div { font-size: 12px; color: var(--text-muted); }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-brand">
      <div class="header-logo">F</div>
      <div>
        <div class="header-name">Felix Enterprise</div>
        <div class="header-sub">Case Management System</div>
      </div>
    </div>
    <a href="index.html" class="header-back">← Portal Home</a>
  </div>

  <main>
    <div class="form-card">
      <div class="form-card-header">
        <div class="form-eyebrow">Authentication</div>
        <div class="form-title">Sign In</div>
      </div>

      <div class="form-body">
        <div class="alert" id="alert"></div>
        <div class="resend-row" id="resendRow">
          <button class="btn-resend" onclick="resendVerification()">Resend Verification Email</button>
        </div>

        <div class="field">
          <label class="field-label" for="email">Email Address</label>
          <input class="field-input" type="email" id="email" placeholder="you@organization.gov" autocomplete="email"/>
        </div>

        <div class="field">
          <div class="field-row-split">
            <label class="field-label" for="password">Password</label>
            <a href="forgot.html" class="forgot-link">Forgot password?</a>
          </div>
          <input class="field-input" type="password" id="password" placeholder="••••••••" autocomplete="current-password"/>
        </div>

        <button class="btn btn-primary" id="loginBtn" onclick="handleLogin()">
          Sign In
        </button>

        <div class="divider">or</div>

        <button class="btn btn-google" id="googleBtn" onclick="handleGoogle()">
          <svg class="google-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          Continue with Google
        </button>

        <div class="form-footer">
          Don't have an account? <a href="register.html">Create one</a>
        </div>
      </div>
    </div>
  </main>

  <footer>
    <div>Felix Enterprise &mdash; NBEP</div>
    <div>All sessions encrypted and logged</div>
  </footer>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
    import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-analytics.js";
    import {
      getAuth,
      signInWithEmailAndPassword,
      signInWithPopup,
      GoogleAuthProvider,
      sendEmailVerification
    } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCtEi3_E3ZOwjTdw4tSexlPvEB27lZp0UU",
      authDomain: "felix-582ed.firebaseapp.com",
      projectId: "felix-582ed",
      storageBucket: "felix-582ed.firebasestorage.app",
      messagingSenderId: "434043393116",
      appId: "1:434043393116:web:5f20713d301320c38b0299",
      measurementId: "G-JXR6MRSYME"
    };

    const app      = initializeApp(firebaseConfig);
    const analytics = getAnalytics(app);
    const auth     = getAuth(app);
    const provider = new GoogleAuthProvider();

    let _unverifiedUser = null;

    const errMap = {
      "auth/invalid-credential":     "The email or password you entered is incorrect.",
      "auth/user-not-found":         "No account found with this email address.",
      "auth/wrong-password":         "Incorrect password.",
      "auth/invalid-email":          "Please enter a valid email address.",
      "auth/too-many-requests":      "Too many failed attempts. Please wait a moment and try again.",
      "auth/network-request-failed": "Network error. Please check your connection.",
      "auth/user-disabled":          "This account has been disabled. Contact your administrator.",
    };

    function showAlert(msg, type = "error") {
      const el = document.getElementById("alert");
      el.textContent = msg;
      el.className = `alert ${type}`;
    }

    function clearAlert() {
      document.getElementById("alert").className = "alert";
      document.getElementById("resendRow").classList.remove("visible");
    }

    function setLoading(btnId, loading, defaultText, spinner = "light") {
      const btn = document.getElementById(btnId);
      btn.disabled = loading;
      if (loading) {
        const sc = spinner === "dark" ? "spinner spinner-dark" : "spinner";
        btn.innerHTML = `<div class="${sc}"></div> ${defaultText}...`;
      } else {
        btn.textContent = defaultText;
      }
    }

    window.handleLogin = async function () {
      clearAlert();
      const email    = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;

      if (!email)    return showAlert("Please enter your email address.");
      if (!password) return showAlert("Please enter your password.");

      setLoading("loginBtn", true, "Signing in");

      try {
        const cred = await signInWithEmailAndPassword(auth, email, password);
        if (!cred.user.emailVerified) {
          _unverifiedUser = cred.user;
          showAlert("Your email address has not been verified. Please check your inbox and click the verification link before signing in.", "warning");
          document.getElementById("resendRow").classList.add("visible");
          setLoading("loginBtn", false, "Sign In");
          return;
        }
        window.location.href = "dashboard.html";
      } catch (err) {
        showAlert(errMap[err.code] || `An error occurred: ${err.message}`);
        setLoading("loginBtn", false, "Sign In");
      }
    };

    window.handleGoogle = async function () {
      clearAlert();
      setLoading("googleBtn", true, "Continuing with Google", "dark");

      try {
        await signInWithPopup(auth, provider);
        // Google accounts are pre-verified — go straight to dashboard
        window.location.href = "dashboard.html";
      } catch (err) {
        if (err.code === "auth/popup-closed-by-user") {
          // User dismissed popup — silent fail
        } else {
          showAlert(errMap[err.code] || `Google sign-in failed: ${err.message}`);
        }
        const btn = document.getElementById("googleBtn");
        btn.disabled = false;
        btn.innerHTML = `
          <svg class="google-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          Continue with Google`;
      }
    };

    window.resendVerification = async function () {
      if (!_unverifiedUser) return;
      try {
        await sendEmailVerification(_unverifiedUser);
        showAlert("Verification email sent. Please check your inbox.", "success");
        document.getElementById("resendRow").classList.remove("visible");
      } catch (err) {
        showAlert("Failed to resend. Please wait a moment and try again.", "warning");
      }
    };

    document.addEventListener("keydown", (e) => {
      if (e.key === "Enter") window.handleLogin();
    });
  </script>
</body>
</html>
